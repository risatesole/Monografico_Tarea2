<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeamBase | Choose Team</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #ffffff;
      color: #1f2937;
      display: flex;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      border-right: 1px solid #f3f4f6;
      padding: 20px;
      position: relative;
    }

    .brand {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .list-item {
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 6px;
    }

    .list-item:hover {
      background: #fafafa;
    }

    .active {
      background: #f3f4f6;
      font-weight: 500;
    }

    .btn {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: #1f2937;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
    }

    .btn:hover {
      background: #111827;
    }

    /* MAIN */
    .main {
      flex: 1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #f3f4f6;
    }

    .logo {
      font-size: 15px;
      font-weight: 600;
      color: #1f2937;
      text-decoration: none;
    }

    .content-wrapper {
      max-width: 900px;
      margin: auto;
      padding: 50px 20px;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .team-list {
      border: 1px solid #f3f4f6;
      border-radius: 6px;
      overflow: hidden;
    }

    .team {
      padding: 14px 12px;
      border-top: 1px solid #f3f4f6;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .team:first-child {
      border-top: none;
    }

    .team:hover {
      background: #fafafa;
    }

    .team-meta {
      font-size: 12px;
      color: #6b7280;
    }

    /* USER CARD (same style as other page) */
    .user-card {
      position: absolute;
      bottom: 20px;
      width: 200px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid #f3f4f6;
      border-radius: 8px;
      background: #ffffff;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #1f2937;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }

    .user-name {
      font-size: 13px;
      font-weight: 600;
    }

    .user-role {
      font-size: 11px;
      color: #6b7280;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">

  <div class="brand">TeamBase</div>

  <div class="sidebar-title">NAVIGATION</div>

  <div class="list-item active">Teams</div>
  <div class="list-item">My Activity</div>
  <div class="list-item">Notifications</div>

  <div class="sidebar-title" style="margin-top:15px;">ACTIONS</div>

  <button class="btn">Create Team</button>

  <!-- USER -->
  <div class="user-card">
    <div class="avatar">H</div>
    <div>
      <div class="user-name">Henry Ramirez</div>
      <div class="user-role">Team Member</div>
    </div>
  </div>

</aside>

<!-- MAIN -->
<div class="main">

<header>
  <a href="/" class="logo">TeamBase</a>
</header>

<main class="content-wrapper">

  <h2>Choose a Team</h2>

  <div class="team-list">

    <div class="team">
      <div>
        Design Team
        <div class="team-meta">3 members</div>
      </div>
      <div class="team-meta">→</div>
    </div>

    <div class="team">
      <div>
        Engineering Team
        <div class="team-meta">5 members</div>
      </div>
      <div class="team-meta">→</div>
    </div>

    <div class="team">
      <div>
        Marketing Team
        <div class="team-meta">2 members</div>
      </div>
      <div class="team-meta">→</div>
    </div>

    <div class="team">
      <div>
        Operations Team
        <div class="team-meta">4 members</div>
      </div>
      <div class="team-meta">→</div>
    </div>

  </div>

</main>

</div>

</body>
</html>
